        <h1>CBH Business Group — M&amp;A Advisory &amp; Business Brokerage</h1>
        <p>CBH Business Group is a Florida-based M&amp;A advisory and business brokerage firm specializing in representing privately held businesses through strategic sale transactions, valuation advisory, and structured exit planning. With over 50 years of combined experience, our team has worked with more than 2,300 buyers and facilitated transactions across multiple industries.</p>
        <h2>Our Services</h2>
        <ul>
          <li><strong>Accurate Business Valuation</strong> — Defensible, market-based valuation grounded in financial normalization and EBITDA clarity.</li>
          <li><strong>Strategic Buyer Identification</strong> — Targeted outreach to qualified strategic buyers, PE groups, and individual acquirers.</li>
          <li><strong>Confidential Marketing Processes</strong> — No public listings. Controlled, NDA-protected outreach.</li>
          <li><strong>Negotiation &amp; Deal Execution</strong> — Structured deal management from LOI through closing and transition.</li>
        </ul>
        <h2>Our Team</h2>
        <p><strong>George Hastings</strong> — Broker &amp; Business Consultant. Over 35 years of entrepreneurial experience building and selling multiple successful businesses.</p>
        <p><strong>Richard W. Bradley</strong> — CPA / M&amp;A Expert. Over 28 years negotiating the sale of numerous large companies, specializing in troubled business recoveries and exit strategies.</p>
        <p><strong>Jesse Hastings</strong> — Business Growth &amp; Scaling Specialist. Serial entrepreneur who has built and scaled five companies across diverse industries.</p>
        <p><strong>Santiago Flores</strong> — Sales &amp; Marketing Director. Over 18 years of experience in sales and marketing with a proven track record of driving growth.</p>
